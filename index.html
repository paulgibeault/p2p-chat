<!DOCTYPE html>
<html lang="en">
<head>
<script src="/arcade-sdk.js"></script>
<script>Arcade.init({ gameId: 'p2p-chat' });</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>P2P Chat</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="P2P Chat">
<meta name="theme-color" content="#14151f">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236c8cff'/%3E%3Cstop offset='100%25' stop-color='%23a06cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='108' fill='%2314151f'/%3E%3Cpath d='M96 168a56 56 0 0 1 56-56h208a56 56 0 0 1 56 56v104a56 56 0 0 1-56 56H208l-72 56v-56h-8a56 56 0 0 1-56-56z' fill='url(%23g)'/%3E%3Ccircle cx='188' cy='220' r='16' fill='%2314151f'/%3E%3Ccircle cx='256' cy='220' r='16' fill='%2314151f'/%3E%3Ccircle cx='324' cy='220' r='16' fill='%2314151f'/%3E%3C/svg%3E">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app" id="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">💬</span>
      <h1>P2P Chat</h1>
    </div>
    <div class="conn" id="conn" title="Connection status">
      <span class="dot" id="connDot"></span>
      <span class="connLabel" id="connLabel">Unavailable</span>
    </div>
  </header>

  <div class="banner" id="banner" hidden></div>

  <nav class="peer-tabs" id="peerTabs" role="tablist" aria-label="Known peers" hidden></nav>
  <p class="empty-hint" id="peersEmptyHint" hidden>Pair with a peer from the arcade's Multiplayer menu to start a chat. Every peer you've talked to gets its own tab here.</p>

  <nav class="tabs" id="subTabs" role="tablist" hidden>
    <button class="tab active" id="tabBtnChat" data-tab="chat" role="tab" aria-selected="true">Chat</button>
    <button class="tab" id="tabBtnFiles" data-tab="files" role="tab" aria-selected="false">Files <span class="badge" id="filesBadge" hidden>0</span></button>
  </nav>

  <main class="panels" id="panels" hidden>

    <section class="panel" id="panel-chat">
      <div class="messages" id="messages" aria-live="polite"></div>
      <button class="jump-latest" id="jumpLatest" hidden type="button">New messages ↓</button>

      <p class="peer-archived-hint" id="peerArchivedHint" hidden></p>

      <div class="composer" id="composer">
        <button type="button" class="icon-btn" id="attachBtn" title="Attach a file" aria-label="Attach a file" disabled>📎</button>
        <input type="file" id="fileInput" multiple hidden>
        <input type="text" id="textInput" placeholder="Pair with a peer to start chatting…" autocomplete="off" disabled maxlength="2000">
        <button type="button" class="send-btn" id="sendBtn" disabled>Send</button>
      </div>

      <div class="chat-actions">
        <button class="link-btn" id="clearChatBtn" type="button">Clear chat</button>
      </div>
    </section>

    <section class="panel hidden" id="panel-files">
      <div class="files-toolbar">
        <span id="filesCount">0 files</span>
        <button class="link-btn" id="clearFilesBtn" type="button">Clear files</button>
      </div>
      <div class="files-list" id="filesList"></div>
      <p class="empty-hint" id="filesEmptyHint">Files sent or received in this chat will show up here.</p>
    </section>

  </main>
</div>

<div class="lightbox" id="lightbox" hidden>
  <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close">✕</button>
  <div class="lightbox-content" id="lightboxContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
